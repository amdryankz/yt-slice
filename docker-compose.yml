services:
  postgres:
    image: postgres:16-alpine
    container_name: clipper-postgres
    environment:
      POSTGRES_USER: clipper_user
      POSTGRES_PASSWORD: clipper_password
      POSTGRES_DB: clipper_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: clipper-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: